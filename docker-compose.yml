version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: readstrava_db
    environment:
      POSTGRES_USER: readstrava_user
      POSTGRES_PASSWORD: readstrava_password
      POSTGRES_DB: readstrava
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
